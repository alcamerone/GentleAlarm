name: Unblock gate on CODEOWNER approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  actions: write
  checks: write

jobs:
  unblock:
    name: Re-run gate after CODEOWNER approval
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved'
    steps:
      - name: Unblock gate if tests passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEWER: ${{ github.event.review.user.login }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Verify reviewer is a CODEOWNER
          CODEOWNERS=""
          for co_path in "CODEOWNERS" ".github/CODEOWNERS" "docs/CODEOWNERS"; do
            CODEOWNERS=$(gh api "repos/$GITHUB_REPOSITORY/contents/$co_path" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || true)
            [ -n "$CODEOWNERS" ] && break
          done

          if ! echo "$CODEOWNERS" | grep -q "@$REVIEWER"; then
            echo "@$REVIEWER is not a CODEOWNER — no action taken."
            exit 0
          fi

          echo "CODEOWNER @$REVIEWER approved. Checking test suite status..."

          # Check the test_suite job's check run conclusion for this commit
          TEST_CONCLUSION=$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/check-runs" \
            --jq '[.check_runs[] | select(.name | test("Test suite"))] | sort_by(.started_at) | last | .conclusion' \
            2>/dev/null || echo "")

          if [ "$TEST_CONCLUSION" != "success" ]; then
            echo "Test suite has not passed (conclusion: ${TEST_CONCLUSION:-not found}) — cannot unblock."
            exit 0
          fi

          # Tests passed — find and patch the Gate check run to success
          GATE_CHECK_ID=$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/check-runs" \
            --jq '[.check_runs[] | select(.name | test("Gate$"))] | sort_by(.started_at) | last | .id' \
            2>/dev/null || echo "")

          if [ -z "$GATE_CHECK_ID" ] || [ "$GATE_CHECK_ID" = "null" ]; then
            echo "No Gate check run found for commit $HEAD_SHA — nothing to patch."
            exit 1
          fi

          echo "Patching Gate check run $GATE_CHECK_ID to success..."
          gh api "repos/$GITHUB_REPOSITORY/check-runs/$GATE_CHECK_ID" \
            --method PATCH \
            --field status=completed \
            --field conclusion=success \
            --field "output[title]=Gate passed after CODEOWNER approval" \
            --field "output[summary]=CODEOWNER @$REVIEWER approved this PR. Tests passed. All other checks overridden."

          echo "Done. Gate unblocked."
