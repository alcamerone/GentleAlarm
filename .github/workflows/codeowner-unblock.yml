name: Unblock gate on CODEOWNER approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  actions: write

jobs:
  unblock:
    name: Re-run gate after CODEOWNER approval
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved'
    steps:
      - name: Re-run Gate if CODEOWNER approved and tests passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEWER: ${{ github.event.review.user.login }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Verify reviewer is a CODEOWNER
          CODEOWNERS=""
          for co_path in "CODEOWNERS" ".github/CODEOWNERS" "docs/CODEOWNERS"; do
            CODEOWNERS=$(gh api "repos/$GITHUB_REPOSITORY/contents/$co_path" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || true)
            [ -n "$CODEOWNERS" ] && break
          done

          if ! echo "$CODEOWNERS" | grep -q "@$REVIEWER"; then
            echo "@$REVIEWER is not a CODEOWNER — no action taken."
            exit 0
          fi

          echo "CODEOWNER @$REVIEWER approved. Checking test suite status..."

          # Check the test_suite job's check run conclusion for this commit
          TEST_CONCLUSION=$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/check-runs" \
            --jq '[.check_runs[] | select(.name | test("Test suite"))] | sort_by(.started_at) | last | .conclusion' \
            2>/dev/null || echo "")

          if [ "$TEST_CONCLUSION" != "success" ]; then
            echo "Test suite has not passed (conclusion: ${TEST_CONCLUSION:-not found}) — cannot unblock."
            exit 0
          fi

          # Find the AI PR Review workflow run for this commit
          RUN_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ai-review.yml/runs" \
            --jq "[.workflow_runs[] | select(.head_sha == \"$HEAD_SHA\")] | first | .id" \
            2>/dev/null || echo "")

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No AI PR Review workflow run found for commit $HEAD_SHA — nothing to re-run."
            exit 1
          fi

          # Find the Gate job ID within that run
          GATE_JOB_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/jobs" \
            --jq '[.jobs[] | select(.name | test("^Gate$"))] | last | .id' \
            2>/dev/null || echo "")

          if [ -z "$GATE_JOB_ID" ] || [ "$GATE_JOB_ID" = "null" ]; then
            echo "No Gate job found in run $RUN_ID — nothing to re-run."
            exit 1
          fi

          echo "Re-running Gate job $GATE_JOB_ID in run $RUN_ID..."
          gh run rerun "$RUN_ID" --job "$GATE_JOB_ID" --repo "$GITHUB_REPOSITORY"

          echo "Done. Gate job queued for re-run."
