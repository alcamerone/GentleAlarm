# SwiftLint configuration for GentleAlarm
# Full rule list: https://realm.github.io/SwiftLint/rule-directory.html

included:
  - GentleAlarm

excluded:
  - GentleAlarmTests
  - GentleAlarmUITests

# Rules disabled because they conflict with this project's conventions
disabled_rules:
  - trailing_whitespace       # Xcode auto-manages this
  - trailing_comma            # Project convention: no trailing commas

opt_in_rules:
  - empty_count               # prefer .isEmpty over .count == 0
  - force_unwrapping          # warn on ! unwraps
  - sorted_imports            # keep imports alphabetical

# Tuned thresholds
line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 200
  error: 300

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 40
  error: 60
